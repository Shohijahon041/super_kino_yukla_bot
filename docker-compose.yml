version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinemahub-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - cinemahub

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: cinemahub-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file: ./admin/.env.local
    depends_on:
      - backend
    networks:
      - cinemahub

  postgres:
    image: postgres:16-alpine
    container_name: cinemahub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cinemahub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemahub

  redis:
    image: redis:7-alpine
    container_name: cinemahub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinemahub

  minio:
    image: minio/minio:latest
    container_name: cinemahub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cinemahub

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: cinemahub-elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - cinemahub

  nginx:
    image: nginx:alpine
    container_name: cinemahub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin
    networks:
      - cinemahub

  prometheus:
    image: prom/prometheus:latest
    container_name: cinemahub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - cinemahub

  grafana:
    image: grafana/grafana:latest
    container_name: cinemahub-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cinemahub

volumes:
  postgres_data:
  redis_data:
  minio_data:
  elastic_data:
  grafana_data:

networks:
  cinemahub:
    driver: bridge
